// ===== 精准解析器 v2 =====

// 解析重量区间，支持所有格式：远朋(0.05≤W≤0.1) / 云途(0＜W≤0.1) / 万邦(0.101-0.2KG)
function parseWeightRange(s) {
  if (!s || typeof s !== 'string') return null;
  // 去掉KG单位和W字符，数字和小数点保留
  const clean = s.replace(/KG/gi,'').replace(/W/gi,'').trim();
  const nums = clean.match(/\d+\.?\d*/g);
  if (!nums || nums.length < 2) return null;
  const min = parseFloat(nums[0]);
  const max = parseFloat(nums[1]);
  if (isNaN(min) || isNaN(max) || max <= 0) return null;
  return { min, max };
}

// 判断是否为合法国家名（排除价格、说明、表头等干扰行）
function isValidCountry(s) {
  if (!s || s.length === 0 || s.length > 20) return false;
  // 排除含有数字+单位的价格行
  if (/\d+\s*(RMB|元|kg|KG|票|\/)/i.test(s)) return false;
  // 排除明显的表头或说明
  const blacklist = ['国家','地区','说明','注意','计费','备注','渠道','产品','重量','运费','挂号','服务','合计','小计','nan','undefined','null'];
  if (blacklist.some(b => s.includes(b))) return false;
  return true;
}

// ── 远朋解析器 ──
// 格式：col1=国家(合并单元格向下填充), col2=重量区间, col3=运费/KG, col4=挂号费/票
function parseYuanpeng(data, sheetName) {
  const records = [];
  let currentCountry = null;
  // 找数据起始行（跳过标题行，找到国家列有内容的行）
  let startRow = 0;
  for (let i = 0; i < Math.min(data.length, 10); i++) {
    const v = data[i] && data[i][1] ? String(data[i][1]).trim() : '';
    if (v === '国家') { startRow = i + 1; break; }
  }
  for (let i = startRow; i < data.length; i++) {
    const row = data[i] || [];
    const c1 = row[1] != null ? String(row[1]).trim() : '';
    const c2 = row[2] != null ? String(row[2]).trim() : '';
    const c3 = row[3] != null ? String(row[3]).trim() : '';
    const c4 = row[4] != null ? String(row[4]).trim() : '';
    // 更新当前国家（合并单元格效果）
    if (isValidCountry(c1)) currentCountry = c1;
    if (!currentCountry) continue;
    const w = parseWeightRange(c2);
    if (!w) continue;
    const freightMatch = c3.match(/^\d+\.?\d*$/);
    if (!freightMatch) continue;
    const freight = parseFloat(c3);
    if (!freight || freight <= 0) continue;
    const feeMatch = c4.match(/^\d+\.?\d*$/);
    const fee = feeMatch ? parseFloat(c4) : 0;
    records.push({
      supplier: '远朋供应链', channel: sheetName, country: currentCountry,
      weight_min: w.min, weight_max: w.max, freight_per_kg: freight, handling_fee: fee
    });
  }
  return records;
}

// ── 云途解析器 ──
// 格式：col1=国家/地区, col4=重量(KG), col7=运费(RMB/KG), col8=挂号费(RMB/票)
// 表头在第4行(index=3)
function parseYuntu(data, sheetName, supplierName) {
  const records = [];
  let currentCountry = null;
  // 找表头行（含"国家"和"运费"）
  let headerRow = -1;
  for (let i = 0; i < Math.min(data.length, 8); i++) {
    const row = data[i] || [];
    const joined = row.map(v => v != null ? String(v) : '').join(' ');
    if (joined.includes('国家') && joined.includes('运费')) {
      headerRow = i; break;
    }
  }
  if (headerRow === -1) return [];
  // 找各列位置
  const hrow = data[headerRow].map(v => v != null ? String(v).trim() : '');
  let cCountry=-1, cWeight=-1, cFreight=-1, cFee=-1;
  hrow.forEach((v, i) => {
    if ((v.includes('国家') || v.includes('地区')) && cCountry === -1) cCountry = i;
    if (v.includes('重量') && cWeight === -1) cWeight = i;
    if (v.includes('运费') && cFreight === -1) cFreight = i;
    if (v.includes('挂号费') && cFee === -1) cFee = i;
  });
  if (cFreight === -1) return [];
  for (let i = headerRow + 1; i < data.length; i++) {
    const row = data[i] || [];
    const country = cCountry >= 0 && row[cCountry] != null ? String(row[cCountry]).trim() : '';
    const weightStr = cWeight >= 0 && row[cWeight] != null ? String(row[cWeight]).trim() : '';
    const freightStr = row[cFreight] != null ? String(row[cFreight]).trim() : '';
    const feeStr = cFee >= 0 && row[cFee] != null ? String(row[cFee]).trim() : '';
    if (isValidCountry(country)) currentCountry = country;
    if (!currentCountry) continue;
    const w = parseWeightRange(weightStr);
    if (!w) continue;
    const freightNum = freightStr.match(/^\d+\.?\d*$/);
    if (!freightNum) continue;
    const freight = parseFloat(freightStr);
    if (!freight || freight <= 0) continue;
    const feeNum = feeStr.match(/^\d+\.?\d*$/);
    const fee = feeNum ? parseFloat(feeStr) : 0;
    records.push({
      supplier: supplierName, channel: sheetName, country: currentCountry,
      weight_min: w.min, weight_max: w.max, freight_per_kg: freight, handling_fee: fee
    });
  }
  return records;
}

// ── 万邦解析器 ──
// 格式：col1=国家, col2=产品名称(渠道), col6=重量段, col7=公斤重(RMB/KG), col8=操作费(RMB/PCS)
// 表头在第5行(index=4)，国家和产品名称都是合并单元格向下填充
function parseWanbang(data, sheetName) {
  const records = [];
  // 找表头行（含"国家"和"重量段"或"公斤重"）
  let headerRow = -1;
  let cC=-1, cName=-1, cW=-1, cF=-1, cFee=-1;
  for (let i = 0; i < Math.min(data.length, 10); i++) {
    const row = data[i] || [];
    const vals = row.map(v => v != null ? String(v).trim() : '');
    const joined = vals.join(' ');
    if (joined.includes('国家') && (joined.includes('重量段') || joined.includes('公斤重'))) {
      headerRow = i;
      vals.forEach((v, k) => {
        const vl = v.replace(/\n/g,' ');
        if (vl.includes('国家') && cC === -1) cC = k;
        if (vl.includes('产品名称') && cName === -1) cName = k;
        if (vl.includes('重量段') && cW === -1) cW = k;
        if ((vl.includes('公斤重') || vl.includes('RMB/KG')) && cF === -1) cF = k;
        if ((vl.includes('操作费') || vl.includes('挂号费') || vl.includes('RMB/PCS')) && cFee === -1) cFee = k;
      });
      break;
    }
  }
  if (headerRow === -1 || cF === -1 || cW === -1) return [];

  let currentCountry = null;
  let currentChannel = sheetName; // 默认用sheet名作渠道名

  for (let i = headerRow + 1; i < data.length; i++) {
    const row = data[i] || [];
    const vals = row.map(v => v != null ? String(v).trim() : '');

    // 更新国家（合并单元格向下填充）
    if (cC >= 0 && isValidCountry(vals[cC])) currentCountry = vals[cC];
    // 更新渠道名（产品名称列）
    if (cName >= 0 && vals[cName] && vals[cName].length > 1 && vals[cName].length < 30) {
      // 排除说明性内容
      if (!['注意','说明','计费','服务','包裹','一.','二.','三.'].some(x => vals[cName].includes(x))) {
        currentChannel = vals[cName];
      }
    }
    if (!currentCountry) continue;

    const wStr = vals[cW] || '';
    const fStr = vals[cF] || '';
    // 重量段格式：0-0.1KG / 0.101-0.2KG / 0-0.3KG
    const w = parseWeightRange(wStr);
    if (!w) continue;
    const fMatch = fStr.match(/^\d+\.?\d*$/);
    if (!fMatch) continue;
    const freight = parseFloat(fStr);
    if (!freight || freight <= 0) continue;
    const feeStr = cFee >= 0 ? (vals[cFee] || '') : '';
    const feeMatch = feeStr.match(/^\d+\.?\d*$/);
    const fee = feeMatch ? parseFloat(feeStr) : 0;

    records.push({
      supplier: '万邦速达', channel: currentChannel, country: currentCountry,
      weight_min: w.min, weight_max: w.max, freight_per_kg: freight, handling_fee: fee
    });
  }
  return records;
}

// ── 供应商识别 ──
function detectSupplier(filename, sheetNames) {
  const fn = filename.toLowerCase();
  const sheets = sheetNames.join(' ');
  if (fn.includes('远朋') || fn.includes('yuanpeng') || sheets.includes('普货小包专线')) return '远朋供应链';
  if (fn.includes('万邦') || fn.includes('wanbang') || sheets.includes('万邦')) return '万邦速达';
  if (fn.includes('云途') || fn.includes('yuntu') || fn.includes('cn25753') || fn.includes('王淑华') || sheets.includes('云途')) return '云途物流';
  return filename.split('.')[0].substring(0, 12);
}

// ── 跳过无效Sheet ──
const SKIP_SHEETS = new Set([
  '目录','报价总目录','目录国家维度','总目录','寄件须知','货物交接要求','托运条款',
  '禁运品清单','尺寸表','异形件示例图','不可到地区清单','产品品牌表','欧洲国家对应税率表',
  '易碎品包装要求','部分HS原关税','澳大利亚分区邮编','美国偏远邮编地区','DHL快递(香港)分区',
  '保价服务','签名服务','库内增值服务','产品税率参考表','知识产权网','邮编明细',
  '澳洲分区邮编','加拿大邮政-偏远邮编'
]);

function isDataSheet(sheetName) {
  if (SKIP_SHEETS.has(sheetName)) return false;
  // 跳过包含这些关键词的sheet
  const skipKeywords = ['说明','须知','条款','禁运','偏远','邮编','分区','税率','品牌','包装','图','示例'];
  return !skipKeywords.some(k => sheetName.includes(k));
}

function parseExcel(file) {
  return new Promise(resolve => {
    const reader = new FileReader();
    reader.onload = e => {
      try {
        const wb = XLSX.read(e.target.result, { type: 'array' });
        const supplier = detectSupplier(file.name, wb.SheetNames);
        let records = [];
        for (const sh of wb.SheetNames) {
          if (!isDataSheet(sh)) continue;
          const ws = wb.Sheets[sh];
          const data = XLSX.utils.sheet_to_json(ws, { header: 1, defval: null });
          if (!data || data.length < 5) continue;
          let sheetRecords = [];
          if (supplier === '远朋供应链') {
            sheetRecords = parseYuanpeng(data, sh);
          } else if (supplier === '云途物流') {
            sheetRecords = parseYuntu(data, sh, supplier);
          } else if (supplier === '万邦速达') {
            sheetRecords = parseWanbang(data, sh);
          } else {
            // 通用：先尝试远朋格式，再尝试云途格式
            sheetRecords = parseYuanpeng(data, sh);
            if (sheetRecords.length === 0) sheetRecords = parseYuntu(data, sh, supplier);
            if (sheetRecords.length === 0) sheetRecords = parseWanbang(data, sh);
          }
          records = records.concat(sheetRecords);
        }
        resolve({ supplier, records, filename: file.name, ok: true });
      } catch (err) {
        resolve({ supplier: file.name, records: [], filename: file.name, ok: false, err: err.message });
      }
    };
    reader.readAsArrayBuffer(file);
  });
}

  e.preventDefault(); dz.style.borderColor='#ddd';
  const files=Array.from(e.dataTransfer.files).filter(f=>f.name.match(/\.(xlsx|xls)$/i));
  if(files.length){const dt=new DataTransfer();files.forEach(f=>dt.items.add(f));document.getElementById('file-input').files=dt.files;document.getElementById('file-input').dispatchEvent(new Event('change'));}
});

function renderFileList() {
  const container = document.getElementById('file-list');
  container.innerHTML = pendingFiles.map((f,i)=>`
    <div class="file-item">
      <span>${f.ok?'✅':'❌'}</span>
      <span class="name">${f.filename}</span>
      <span class="tag">${f.supplier}</span>
      <span class="count">${f.records.length} 条记录</span>
      <button class="remove" onclick="removePending(${i})">×</button>
    </div>`).join('');
  document.getElementById('upload-btn').style.display = pendingFiles.length>0 ? 'inline-block' : 'none';
}

function removePending(i) { pendingFiles.splice(i,1); renderFileList(); }

async function uploadAll() {
  if (!pendingFiles.length) return;
  const allRecords = pendingFiles.flatMap(f=>f.records);
  if (!allRecords.length) { alert('没有可上传的数据'); return; }

  document.getElementById('progress-wrap').style.display='block';
  document.getElementById('status-log').style.display='block';
  document.getElementById('upload-btn').disabled=true;
  const log = document.getElementById('status-log');
  log.innerHTML='';

  const addLog = (msg, ok=true) => { log.innerHTML += `<div class="${ok?'ok':'err'}">${msg}</div>`; log.scrollTop=log.scrollHeight; };

  try {
    const suppliers = [...new Set(pendingFiles.map(f=>f.supplier))];
    for (const sup of suppliers) {
      addLog(`🗑 删除旧数据：${sup}...`);
      const { error } = await db.from('logistics_prices').delete().eq('supplier', sup);
      if (error) throw error;
    }

    const batchSize = 500;
    let done = 0;
    for (let i=0; i<allRecords.length; i+=batchSize) {
      const batch = allRecords.slice(i, i+batchSize);
      const { error } = await db.from('logistics_prices').insert(batch);
      if (error) throw error;
      done += batch.length;
      const pct = Math.round(done/allRecords.length*100);
      document.getElementById('progress-fill').style.width=pct+'%';
      document.getElementById('progress-text').textContent=`已上传 ${done} / ${allRecords.length} 条...`;
    }

    await db.from('logistics_meta').insert({updated_at: new Date().toISOString(), note: suppliers.join(', ')});

    addLog(`✅ 上传完成！共 ${allRecords.length} 条价格记录`);
    document.getElementById('progress-text').textContent='上传完成！';
    pendingFiles=[];
    renderFileList();
    setTimeout(loadStats, 500);
  } catch(e) {
    addLog('❌ 上传失败：'+e.message, false);
  }
  document.getElementById('upload-btn').disabled=false;
}

async function clearSupplier(supplier) {
  if (!confirm(`确认删除 ${supplier} 的所有数据？`)) return;
  try {
    const { error } = await db.from('logistics_prices').delete().eq('supplier', supplier);
    if (error) throw error;
    loadStats();
  } catch(e) { alert('删除失败：'+e.message); }
}

async function clearAll() {
  if (!confirm('确认清空全部价格数据？此操作不可恢复！')) return;
  try {
    await db.from('logistics_prices').delete().gte('id', 0);
    await db.from('logistics_meta').delete().gte('id', 0);
    loadStats();
  } catch(e) { alert('清空失败：'+e.message); }
}
</script>
